<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FLASHBOX — Photo Booth</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Permanent+Marker&family=Press+Start+2P&family=Playfair+Display:ital@0;1&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F5F0E8;
    --black: #0D0D0D;
    --red: #E8341A;
    --gold: #C9A84C;
    --warm-gray: #C4BDAF;
    --strip-bg: #1A1410;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999; opacity: .35;
  }

  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; }

  /* ══════════════════════════════════
     WELCOME SCREEN
  ══════════════════════════════════ */
  #welcome {
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 2rem 1.2rem 3rem;
    position: relative;
    gap: 0;
    overflow-y: auto;
  }

  .welcome-bg {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 20% 50%, #2A1A0A 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, #1A0A0A 0%, transparent 50%),
                var(--black);
    pointer-events: none;
  }

  .brand {
    position: relative;
    text-align: center;
    z-index: 1;
    margin-top: 1.5rem;
  }

  .brand-sub {
    font-size: .7rem;
    letter-spacing: .35em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 300;
    margin-bottom: .5rem;
  }

  .brand h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(4.5rem, 20vw, 10rem);
    line-height: .88;
    letter-spacing: -.01em;
    color: var(--cream);
  }

  .brand h1 span { color: var(--red); }

  .brand-tagline {
    font-size: .78rem;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--warm-gray);
    margin-top: 1rem;
    font-weight: 300;
    font-style: italic;
  }

  .corner-deco {
    position: fixed;
    width: 60px; height: 60px;
    opacity: .2;
  }
  .corner-deco.tl { top: 1rem; left: 1rem; border-top: 2px solid var(--gold); border-left: 2px solid var(--gold); }
  .corner-deco.tr { top: 1rem; right: 1rem; border-top: 2px solid var(--gold); border-right: 2px solid var(--gold); }
  .corner-deco.bl { bottom: 1rem; left: 1rem; border-bottom: 2px solid var(--gold); border-left: 2px solid var(--gold); }
  .corner-deco.br { bottom: 1rem; right: 1rem; border-bottom: 2px solid var(--gold); border-right: 2px solid var(--gold); }

  .welcome-options {
    position: relative; z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.2rem;
    margin-top: 2rem;
    width: 100%;
    max-width: 380px;
  }

  .section-label {
    font-size: .62rem;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--warm-gray);
    width: 100%;
    font-weight: 300;
    margin-bottom: -.4rem;
  }

  /* Photo count */
  .photo-count-selector {
    display: flex;
    gap: .6rem;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.1);
    padding: .5rem;
    border-radius: 4px;
  }

  .photo-count-selector label {
    font-size: .7rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--warm-gray);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: .3rem;
    cursor: pointer;
  }

  .photo-count-selector input[type=radio] { display: none; }

  .count-btn {
    width: 52px; height: 52px;
    border: 1px solid rgba(255,255,255,.15);
    background: transparent;
    color: var(--cream);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.7rem;
    cursor: pointer;
    transition: all .2s;
    display: flex; align-items: center; justify-content: center;
  }

  .photo-count-selector input:checked + .count-btn {
    background: var(--red);
    border-color: var(--red);
    color: white;
  }

  /* ── STRIP TEMPLATES ── */
  .template-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: .6rem;
    width: 100%;
  }

  .tmpl-opt { cursor: pointer; }
  .tmpl-opt input[type=radio] { display: none; }

  .tmpl-card {
    border: 2px solid transparent;
    transition: all .2s;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .tmpl-opt input:checked + .tmpl-card {
    border-color: var(--gold);
    box-shadow: 0 0 12px rgba(201,168,76,.3);
  }

  .tmpl-preview {
    width: 100%;
    aspect-ratio: 9/16;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 4px;
    gap: 2px;
    position: relative;
    overflow: hidden;
  }

  /* Mini photo placeholders in template preview */
  .tmpl-slot {
    width: 100%;
    flex: 1;
    min-height: 0;
    background: rgba(255,255,255,.18);
  }

  .tmpl-footer-preview {
    width: 100%;
    height: 14px;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 4px;
    letter-spacing: .04em;
  }

  .tmpl-name {
    text-align: center;
    font-size: .52rem;
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: .3rem .2rem;
    font-weight: 500;
  }

  /* Template themes */
  /* 1: Romantic Vintage */
  .tmpl-romantic .tmpl-preview { background: #2C1A0D; }
  .tmpl-romantic .tmpl-slot { background: rgba(255,220,180,.2); border: 1px solid rgba(200,150,100,.2); }
  .tmpl-romantic .tmpl-footer-preview { color: #C9A84C; font-family: 'Playfair Display', serif; font-style: italic; }
  .tmpl-romantic .tmpl-name { color: #C9A84C; background: #1A1008; }

  /* 2: Retro Arcade */
  .tmpl-arcade .tmpl-preview { background: #0A000F; }
  .tmpl-arcade .tmpl-slot { background: rgba(0,255,200,.1); border: 1px solid rgba(0,255,200,.25); }
  .tmpl-arcade .tmpl-footer-preview { color: #00FFCC; }
  .tmpl-arcade .tmpl-name { color: #FF00AA; background: #0A000F; }

  /* 3: Party */
  .tmpl-party .tmpl-preview { background: #FF6B35; }
  .tmpl-party .tmpl-slot { background: rgba(255,255,255,.25); border: 2px dashed rgba(255,255,0,.5); }
  .tmpl-party .tmpl-footer-preview { color: #FFFF00; }
  .tmpl-party .tmpl-name { color: #FF6B35; background: #FFF5E0; }

  /* 4: Minimal */
  .tmpl-minimal .tmpl-preview { background: #F5F5F5; }
  .tmpl-minimal .tmpl-slot { background: rgba(0,0,0,.08); border: 1px solid rgba(0,0,0,.12); }
  .tmpl-minimal .tmpl-footer-preview { color: #333; font-family: 'DM Sans', sans-serif; }
  .tmpl-minimal .tmpl-name { color: #333; background: #F5F5F5; }

  /* 5: Black Film */
  .tmpl-film .tmpl-preview { background: #111; }
  .tmpl-film .tmpl-slot { background: rgba(255,255,255,.07); border: none; }
  .tmpl-film .tmpl-footer-preview { color: rgba(255,255,255,.5); }
  .tmpl-film .tmpl-name { color: var(--warm-gray); background: #111; }

  /* 6: Dreamy Pastel */
  .tmpl-dreamy .tmpl-preview { background: linear-gradient(180deg, #FADADD 0%, #C8E6FA 100%); }
  .tmpl-dreamy .tmpl-slot { background: rgba(255,255,255,.4); border: 1px solid rgba(255,180,200,.4); }
  .tmpl-dreamy .tmpl-footer-preview { color: #D48CB0; }
  .tmpl-dreamy .tmpl-name { color: #D48CB0; background: #FFF0F5; }

  /* Filter selector */
  .filter-selector {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: .45rem;
    width: 100%;
  }

  .filter-opt { cursor: pointer; text-align: center; }
  .filter-opt input[type=radio] { display: none; }

  .filter-thumb {
    width: 100%;
    aspect-ratio: 1;
    border: 2px solid transparent;
    background: rgba(255,255,255,.06);
    display: flex; align-items: center; justify-content: center;
    font-size: .52rem;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--warm-gray);
    font-weight: 500;
    transition: all .2s;
    position: relative;
    overflow: hidden;
  }

  .filter-preview {
    position: absolute; inset: 0;
    background: var(--cream);
    opacity: .15;
  }
  .filter-preview.bw { filter: grayscale(1); background: #888; }
  .filter-preview.warm { background: linear-gradient(135deg, #ffcc80, #ff8a65); }
  .filter-preview.cool { background: linear-gradient(135deg, #80d8ff, #82b1ff); }
  .filter-preview.fade { background: linear-gradient(135deg, #f5deb3, #d2b48c); opacity: .25; }

  .filter-opt input:checked + .filter-thumb {
    border-color: var(--gold);
    color: var(--gold);
  }
  .filter-label-text { position: relative; z-index: 1; }

  .btn-start {
    width: 100%;
    padding: 1.1rem;
    background: var(--red);
    color: white;
    border: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: .1em;
    cursor: pointer;
    transition: all .2s;
    position: relative;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .btn-start::after {
    content: '';
    position: absolute; inset: 0;
    background: white;
    transform: translateX(-100%);
    transition: transform .3s;
    mix-blend-mode: overlay;
    opacity: .2;
  }

  .btn-start:hover::after { transform: translateX(0); }
  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(232,52,26,.4); }
  .btn-start:active { transform: scale(.98); }

  /* ══════════════════════════════════
     BOOTH SCREEN
  ══════════════════════════════════ */
  #booth {
    flex-direction: column;
    align-items: stretch;
    gap: 0;
    overflow: hidden;
  }

  .booth-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 1rem 1rem 0;
    position: relative;
    background: #0A0A0A;
  }

  .viewfinder-wrap {
    position: relative;
    width: 100%;
    max-width: 520px;
    aspect-ratio: 4/3;
    background: #111;
    overflow: hidden;
    border-radius: 2px;
  }

  #video, #snapshot-canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
  }

  #video { transform: scaleX(-1); }

  .vf-overlay {
    position: absolute; inset: 0;
    pointer-events: none; z-index: 2;
  }

  .vf-overlay::before, .vf-overlay::after {
    content: '';
    position: absolute;
    background: rgba(255,255,255,.06);
  }
  .vf-overlay::before { top: 33.33%; left: 0; right: 0; height: 1px; box-shadow: 0 calc(33.33% * 1) 0 rgba(255,255,255,.06); }
  .vf-overlay::after { left: 33.33%; top: 0; bottom: 0; width: 1px; box-shadow: calc(33.33% * 1) 0 0 rgba(255,255,255,.06); }

  .bracket { position: absolute; width: 20px; height: 20px; opacity: .7; }
  .bracket.tl { top: 8px; left: 8px; border-top: 2px solid var(--cream); border-left: 2px solid var(--cream); }
  .bracket.tr { top: 8px; right: 8px; border-top: 2px solid var(--cream); border-right: 2px solid var(--cream); }
  .bracket.bl { bottom: 8px; left: 8px; border-bottom: 2px solid var(--cream); border-left: 2px solid var(--cream); }
  .bracket.br { bottom: 8px; right: 8px; border-bottom: 2px solid var(--cream); border-right: 2px solid var(--cream); }

  .countdown-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(6rem, 25vw, 12rem);
    color: white;
    text-shadow: 0 0 60px rgba(0,0,0,.8);
    z-index: 10;
    pointer-events: none;
    opacity: 0;
    transition: opacity .15s;
  }

  .countdown-overlay.visible { opacity: 1; }

  .flash-overlay {
    position: absolute; inset: 0;
    background: white; z-index: 20;
    pointer-events: none; opacity: 0;
    transition: opacity .05s;
  }

  .flash-overlay.flash { opacity: 1; }

  /* Booth bottom area: strip + controls side by side on mobile */
  .booth-bottom {
    display: flex;
    flex-direction: row;
    align-items: stretch;
    gap: 0;
    background: #0A0A0A;
    border-top: 1px solid rgba(255,255,255,.06);
    max-height: 200px;
  }

  /* Strip panel in booth */
  .strip-panel {
    width: 130px;
    min-width: 130px;
    background: var(--strip-bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: .75rem .6rem;
    gap: 0;
    border-right: 1px solid rgba(255,255,255,.06);
    overflow-y: auto;
  }

  .strip-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: .85rem;
    letter-spacing: .2em;
    color: var(--gold);
    margin-bottom: .6rem;
    text-align: center;
  }

  .strip-photos {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 3px;
    padding: 5px;
    background: #111;
    border: 1px solid rgba(255,255,255,.08);
  }

  .strip-photo-slot {
    width: 100%;
    aspect-ratio: 4/3;
    background: rgba(255,255,255,.04);
    border: 1px dashed rgba(255,255,255,.1);
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }

  .strip-photo-slot img {
    width: 100%; height: 100%;
    object-fit: cover;
  }

  .slot-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    color: rgba(255,255,255,.15);
  }

  .strip-footer {
    width: 100%;
    background: #111;
    padding: .3rem 5px;
    text-align: center;
    border: 1px solid rgba(255,255,255,.08);
    border-top: none;
  }

  .strip-footer-text { font-size: .45rem; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,.25); }
  .strip-footer-date { font-size: .45rem; color: rgba(255,255,255,.15); margin-top: 1px; }

  /* Controls area */
  .booth-controls {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: .75rem;
    padding: 1rem;
  }

  .progress-dots {
    display: flex;
    gap: .6rem;
    align-items: center;
  }

  .dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,.3);
    transition: all .3s;
  }

  .dot.taken { background: var(--gold); border-color: var(--gold); }
  .dot.current { background: var(--red); border-color: var(--red); transform: scale(1.3); }

  .shutter-row {
    display: flex;
    align-items: center;
    gap: 1.2rem;
  }

  .btn-shutter {
    width: 68px; height: 68px;
    border-radius: 50%;
    background: var(--cream);
    border: 5px solid rgba(255,255,255,.3);
    cursor: pointer;
    transition: all .15s;
    position: relative;
    outline: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .btn-shutter::before {
    content: '';
    position: absolute; inset: 6px;
    border-radius: 50%;
    background: var(--cream);
  }

  .btn-shutter:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(245,240,232,.3); }
  .btn-shutter:active { transform: scale(.92); }
  .btn-shutter:disabled { opacity: .35; cursor: not-allowed; transform: none; }

  .status-text {
    font-size: .68rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--warm-gray);
    min-height: 1rem;
    text-align: center;
  }

  .status-text.active-text { color: var(--red); }

  .strip-actions {
    display: flex;
    flex-direction: column;
    gap: .4rem;
    width: 100%;
  }

  .btn-strip-action {
    width: 100%;
    padding: .5rem .6rem;
    border: 1px solid;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: .62rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all .2s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .btn-strip-action.primary { border-color: var(--red); color: var(--red); }
  .btn-strip-action.primary:hover, .btn-strip-action.primary:active { background: var(--red); color: white; }

  .btn-strip-action.secondary { border-color: rgba(255,255,255,.2); color: var(--warm-gray); }
  .btn-strip-action.secondary:hover { border-color: var(--cream); color: var(--cream); }

  .btn-strip-action:disabled { opacity: .3; cursor: not-allowed; }

  /* ══════════════════════════════════
     RESULT SCREEN
  ══════════════════════════════════ */
  #result {
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 2rem 1.2rem 3rem;
    gap: 1.5rem;
    background: radial-gradient(ellipse at center, #1A1208 0%, var(--black) 70%);
    overflow-y: auto;
  }

  .result-title { text-align: center; }

  .result-title h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 10vw, 4rem);
    letter-spacing: .05em;
    color: var(--cream);
    line-height: 1;
  }

  .result-title p {
    font-size: .72rem;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-top: .4rem;
  }

  .result-content {
    display: flex;
    gap: 2rem;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 600px;
  }

  /* Final strip */
  .final-strip-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: .6rem;
  }

  .final-strip {
    display: flex;
    flex-direction: column;
    padding: 10px 10px 14px;
    gap: 5px;
    box-shadow: 0 20px 60px rgba(0,0,0,.7);
    transform: rotate(-1.5deg);
    transition: transform .3s;
    cursor: pointer;
    max-width: 190px;
  }

  .final-strip:hover { transform: rotate(0deg) scale(1.02); }

  .final-strip .strip-img {
    width: 170px;
    aspect-ratio: 4/3;
    object-fit: cover;
    display: block;
  }

  .strip-brand-footer {
    text-align: center;
    padding-top: 4px;
  }

  .strip-brand-footer .sb-name {
    font-size: .85rem;
    letter-spacing: .2em;
    color: #222;
  }

  .strip-brand-footer .sb-date {
    font-size: .42rem;
    letter-spacing: .1em;
    color: #888;
    margin-top: 1px;
  }

  /* Variants */
  .variants {
    display: flex;
    flex-direction: column;
    gap: .8rem;
    flex: 1;
    min-width: 200px;
  }

  .variants h3 {
    font-size: .62rem;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--warm-gray);
  }

  .variant-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: .5rem;
  }

  .variant-item {
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color .2s;
    background: rgba(255,255,255,.04);
    -webkit-tap-highlight-color: transparent;
  }

  .variant-item:hover, .variant-item.sel { border-color: var(--gold); }

  .variant-item img {
    width: 100%; aspect-ratio: 4/3;
    object-fit: cover; display: block;
  }

  .variant-label {
    text-align: center;
    font-size: .52rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--warm-gray);
    padding: .25rem;
  }

  .result-actions {
    display: flex;
    gap: .8rem;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 400px;
  }

  .btn-result {
    padding: .85rem 1.5rem;
    border: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: .1em;
    cursor: pointer;
    transition: all .2s;
    flex: 1;
    min-width: 120px;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .btn-result.main { background: var(--red); color: white; }
  .btn-result.main:hover { box-shadow: 0 6px 24px rgba(232,52,26,.5); transform: translateY(-2px); }

  .btn-result.alt { background: transparent; color: var(--cream); border: 1px solid rgba(255,255,255,.25); }
  .btn-result.alt:hover { border-color: var(--cream); transform: translateY(-2px); }

  /* ── FILTER CSS ── */
  .filter-normal { filter: none; }
  .filter-bw { filter: grayscale(1) contrast(1.05); }
  .filter-warm { filter: sepia(.45) saturate(1.4) brightness(1.05); }
  .filter-cool { filter: hue-rotate(20deg) saturate(.8) brightness(1.05); }
  .filter-fade { filter: contrast(.8) brightness(1.1) saturate(.6); }
  .filter-vivid { filter: saturate(1.8) contrast(1.1); }
  .filter-drama { filter: contrast(1.4) brightness(.9) saturate(.7); }
  .filter-golden { filter: sepia(.7) saturate(1.6) hue-rotate(-10deg) brightness(1.1); }

     STRIP TEMPLATE STYLES (applied to final strip)
  ══════════════════════════════════ */

  /* 1. Romantic Vintage */
  .strip-tpl-romantic {

  }
  .strip-tpl-party .sb-date { color: rgba(255,255,255,.7); }

  /* 4. Clean & Minimal */
  .strip-tpl-minimal {
    background: #FAFAFA;

  .strip-tpl-minimal .strip-img {
    border: none;

  /* 5. Black Film */

  .strip-tpl-film .strip-img {

  .strip-tpl-film .sb-date { color: rgba(255,255,255,.2); }

  /* 6. Dreamy Pastel */
  .strip-tpl-dreamy {

<script>
  // ═══════ STATE ═══════
  const state = {
    totalPhotos: 3,
    filter: 'normal',

    photos: [],
    photoEls: [],
    stream: null,
    shooting: false,
    currentShot: 0,

  };

  // Template configs
  const TEMPLATES = {
    romantic: {
      bg: '#2C1A0D',
      pad: [12, 10, 16, 10],
      gap: 5,
      imgBorder: '1px solid rgba(201,168,76,.2)',
      footerBg: '#2C1A0D',
      footerColor: '#C9A84C',
      nameFont: 'italic 13px "Playfair Display", serif',
      datColor: 'rgba(201,168,76,.5)',
      label: '✦ FLASHBOX ✦'
    },
    arcade: {
      bg: '#060010',
      pad: [10, 8, 14, 8],
      gap: 5,
      imgBorder: '1px solid rgba(0,255,200,.3)',
      footerBg: '#060010',
      footerColor: '#00FFCC',
      nameFont: 'bold 10px monospace',
      datColor: '#FF00AA',
      label: '▶ FLASHBOX ◀',
      extraTop: '▶ FLASHBOX ◀'
    },
    party: {
      bg: '#FF6B35',
      pad: [10, 10, 14, 10],
      gap: 5,
      imgBorder: '2px dashed rgba(255,255,255,.6)',
      footerBg: '#FF6B35',
      footerColor: 'white',
      nameFont: 'bold 12px cursive',
      datColor: 'rgba(255,255,255,.7)',
      label: '🎉 FLASHBOX 🎊'
    },
    minimal: {
      bg: '#FAFAFA',
      pad: [14, 14, 18, 14],
      gap: 6,
      imgBorder: 'none',
      footerBg: '#FAFAFA',
      footerColor: '#999',
      nameFont: '300 9px "DM Sans", sans-serif',
      datColor: '#bbb',
      label: 'FLASHBOX'
    },
    film: {
      bg: '#0A0A0A',
      pad: [12, 8, 16, 8],
      gap: 4,
      imgBorder: 'none',
      footerBg: '#0A0A0A',
      footerColor: 'rgba(255,255,255,.5)',
      nameFont: 'bold 11px "Bebas Neue", sans-serif',
      datColor: 'rgba(255,255,255,.2)',
      label: 'FLASHBOX'
    },
    dreamy: {
      bg: 'linear-gradient(180deg, #FADADD 0%, #D4EDFF 100%)',
      pad: [12, 10, 16, 10],
      gap: 5,
      imgBorder: '2px solid rgba(255,255,255,.8)',
      footerBg: 'transparent',
      footerColor: '#D48CB0',
      nameFont: '700 11px "Nunito", sans-serif',
      datColor: '#A8C8E8',
      label: '✿ FLASHBOX ✿'
    }
  };

  // ═══════ ELEMENTS ═══════
  const video       = document.getElementById('video');
  const snapCanvas  = document.getElementById('snapshot-canvas');
  const countdownEl = document.getElementById('countdownOverlay');
  const flashEl     = document.getElementById('flashOverlay');
  const progressDots= document.getElementById('progressDots');
  const statusText  = document.getElementById('statusText');
  const btnShutter  = document.getElementById('btnShutter');
  const btnFinish   = document.getElementById('btnFinish');
  const btnRetake   = document.getElementById('btnRetake');
  const stripPhotos = document.getElementById('stripPhotos');
  const buildCanvas = document.getElementById('buildCanvas');
  const filterCanvas= document.getElementById('filterCanvas');

  // ═══════ UTILS ═══════
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0,0);
  }

  function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

  function todayStr() {
    return new Date().toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'}).toUpperCase();
  }

  function applyFilter(ctx, w, h, filterName) {
    if (filterName === 'normal') return;
    const imageData = ctx.getImageData(0, 0, w, h);
    const d = imageData.data;
    for (let i = 0; i < d.length; i += 4) {
      let r = d[i], g = d[i+1], b = d[i+2];
      switch(filterName) {
        case 'bw': { const v = .299*r+.587*g+.114*b; r=g=b=Math.min(255,v*1.05); break; }
        case 'warm': r=Math.min(255,r*1.12); g=Math.min(255,g*1.04); b=Math.max(0,b*.88); break;
        case 'cool': r=Math.max(0,r*.88); g=Math.min(255,g*1.02); b=Math.min(255,b*1.14); break;
        case 'fade': { const avg=.3*r+.59*g+.11*b; r=Math.min(255,r*.7+avg*.3+20); g=Math.min(255,g*.7+avg*.3+20); b=Math.min(255,b*.7+avg*.3+20); break; }
        case 'vivid': {
          const mx=Math.max(r,g,b), mn=Math.min(r,g,b), mid=(mx+mn)/2;
          const s=mx===mn?0:(mx-mn)/(mx>127?2*(255-mx-mn):2*(mx+mn));
          const sf=Math.min(1.8,s*1.8+.4)/Math.max(s,.001);
          r=Math.min(255,Math.max(0,mid+(r-mid)*sf));
          g=Math.min(255,Math.max(0,mid+(g-mid)*sf));
          b=Math.min(255,Math.max(0,mid+(b-mid)*sf));
          r=Math.min(255,r*1.05); g=Math.min(255,g*1.05); break;
        }
        case 'drama': {
          const lum=.299*r+.587*g+.114*b;
          r=Math.min(255,Math.max(0,(r-.5*lum)*1.3+.4*lum));
          g=Math.min(255,Math.max(0,(g-.5*lum)*1.3+.4*lum));
          b=Math.min(255,Math.max(0,(b-.5*lum)*1.3+.4*lum));
          r=Math.max(0,r*.9); g=Math.max(0,g*.9); b=Math.max(0,b*.9); break;
        }
        case 'golden': r=Math.min(255,r*.72+g*.21+b*.07+40); g=Math.min(255,r*.22+g*.72+b*.06+25); b=Math.min(255,r*.01+g*.01+b*.98*.55); break;
      }
      d[i]=r; d[i+1]=g; d[i+2]=b;
    }
    ctx.putImageData(imageData, 0, 0);
  }

  function getCSSFilter(f) {
    const map = {
      normal:'none', bw:'grayscale(1) contrast(1.05)', warm:'sepia(.45) saturate(1.4) brightness(1.05)',
      cool:'hue-rotate(20deg) saturate(.8) brightness(1.05)', fade:'contrast(.8) brightness(1.1) saturate(.6)',
      vivid:'saturate(1.8) contrast(1.1)', drama:'contrast(1.4) brightness(.9) saturate(.7)',
      golden:'sepia(.7) saturate(1.6) hue-rotate(-10deg) brightness(1.1)'
    };
    return map[f] || 'none';
  }

  // ═══════ WELCOME → BOOTH ═══════
  document.getElementById('btnStart').addEventListener('click', async () => {
    state.totalPhotos = parseInt(document.querySelector('input[name=count]:checked').value);
    state.filter = document.querySelector('input[name=filter]:checked').value;
    state.template = document.querySelector('input[name=template]:checked').value;
    state.photos = [];
    state.currentShot = 0;

    showScreen('booth');
    document.getElementById('stripDate').textContent = todayStr();

    buildStripSlots();
    buildProgressDots();
    updateDots();
    await startCamera();
  });

  async function startCamera() {
    try {
      const constraints = { video: { facingMode: 'user', width:{ideal:1280}, height:{ideal:960} }, audio: false };
      state.stream = await navigator.mediaDevices.getUserMedia(constraints);
      video.srcObject = state.stream;
      statusText.textContent = 'Ready — press the shutter';
      btnShutter.disabled = false;
    } catch(e) {
      document.getElementById('viewfinder').innerHTML = `
        <div class="cam-error">
          <div class="cam-error-icon">📷</div>
          <h3>Camera unavailable</h3>
          <p>Please allow camera access in your browser settings and reload the page.</p>
        </div>`;
      statusText.textContent = 'Camera access denied';
      btnShutter.disabled = true;
    }
  }

  function buildStripSlots() {
    stripPhotos.innerHTML = '';
    state.photoEls = [];
    for (let i = 0; i < state.totalPhotos; i++) {
      const slot = document.createElement('div');
      slot.className = 'strip-photo-slot';
      const num = document.createElement('div');
      num.className = 'slot-num';
      num.textContent = i + 1;
      slot.appendChild(num);
      const img = document.createElement('img');
      img.style.display = 'none';
      slot.appendChild(img);
      stripPhotos.appendChild(slot);
      state.photoEls.push(img);
    }
  }

  function buildProgressDots() {
    progressDots.innerHTML = '';
    for (let i = 0; i < state.totalPhotos; i++) {
      const dot = document.createElement('div');
      dot.className = 'dot';
      progressDots.appendChild(dot);
    }
  }

  function updateDots() {
    const dots = progressDots.querySelectorAll('.dot');
    dots.forEach((d, i) => {
      d.classList.remove('taken','current');
      if (i < state.currentShot) d.classList.add('taken');
      else if (i === state.currentShot) d.classList.add('current');
    });
  }

  // ═══════ SHUTTER ═══════
  btnShutter.addEventListener('click', () => {
    if (state.shooting) return;
    takePhoto();
  });

  async function takePhoto() {
    state.shooting = true;
    btnShutter.disabled = true;

    for (let c = 3; c >= 1; c--) {
      countdownEl.textContent = c;
      countdownEl.classList.add('visible');
      statusText.textContent = `Get ready… ${c}`;
      statusText.classList.add('active-text');
      await delay(800);
      countdownEl.classList.remove('visible');
      await delay(200);
    }

    statusText.textContent = '📸 Click!';
    flashEl.classList.add('flash');
    await delay(60);
    flashEl.classList.remove('flash');

    const vw = video.videoWidth || 640;
    const vh = video.videoHeight || 480;
    snapCanvas.width = vw;
    snapCanvas.height = vh;
    const ctx = snapCanvas.getContext('2d');
    ctx.save();
    ctx.translate(vw, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0, vw, vh);
    ctx.restore();
    applyFilter(ctx, vw, vh, state.filter);

    const dataURL = snapCanvas.toDataURL('image/jpeg', .92);
    state.photos.push(dataURL);

    const idx = state.currentShot;
    const imgEl = state.photoEls[idx];
    imgEl.src = dataURL;
    imgEl.style.display = 'block';
    imgEl.className = `filter-${state.filter}`;
    const slot = imgEl.parentElement;
    slot.querySelector('.slot-num').style.display = 'none';

    state.currentShot++;
    updateDots();
    statusText.classList.remove('active-text');

    if (state.currentShot < state.totalPhotos) {
      statusText.textContent = `Photo ${state.currentShot} of ${state.totalPhotos} done!`;
      await delay(600);
      statusText.textContent = 'Ready — press the shutter';
      btnShutter.disabled = false;
    } else {
      statusText.textContent = 'All done! Tap Finish →';
      btnFinish.disabled = false;
    }

    state.shooting = false;
  }

  btnRetake.addEventListener('click', () => {
    if (state.shooting) return;
    state.photos = [];
    state.currentShot = 0;
    buildStripSlots();
    buildProgressDots();
    updateDots();
    btnFinish.disabled = true;
    statusText.textContent = 'Ready — press the shutter';
    statusText.classList.remove('active-text');
    btnShutter.disabled = false;
  });

  btnFinish.addEventListener('click', () => {
    if (state.stream) state.stream.getTracks().forEach(t => t.stop());
    buildResultScreen();
    showScreen('result');
  });

  // ═══════ RESULT SCREEN ═══════
  function buildResultScreen() {
    state.selectedFilter = state.filter;
    renderFinalStrip('finalStrip', state.filter, state.template);

    const grid = document.getElementById('variantGrid');
    grid.innerHTML = '';
    state.allFilters.forEach(f => {
      const item = document.createElement('div');
      item.className = 'variant-item' + (f === state.filter ? ' sel' : '');
      item.dataset.filter = f;

      const img = document.createElement('img');
      img.src = state.photos[0];
      img.className = `filter-${f}`;
      item.appendChild(img);

      const lbl = document.createElement('div');
      lbl.className = 'variant-label';
      lbl.textContent = f.charAt(0).toUpperCase() + f.slice(1);
      item.appendChild(lbl);

      item.addEventListener('click', () => {
        grid.querySelectorAll('.variant-item').forEach(el => el.classList.remove('sel'));
        item.classList.add('sel');
        state.selectedFilter = f;
        renderFinalStrip('finalStrip', f, state.template);
      });

      grid.appendChild(item);
    });
  }

  function renderFinalStrip(containerId, filterName, tplName) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';
    container.className = `final-strip strip-tpl-${tplName}`;

    state.photos.forEach(src => {
      const img = document.createElement('img');
      img.src = src;
      img.className = `strip-img filter-${filterName}`;
      container.appendChild(img);
    });

    const footer = document.createElement('div');
    footer.className = 'strip-brand-footer';
    const tpl = TEMPLATES[tplName];
    footer.innerHTML = `<div class="sb-name">${tpl ? tpl.label : '✦ FLASHBOX ✦'}</div><div class="sb-date">${todayStr()}</div>`;
    container.appendChild(footer);
  }

  // ═══════ DOWNLOAD ═══════
  document.getElementById('btnDownload').addEventListener('click', async () => {
    const tpl = TEMPLATES[state.template] || TEMPLATES.romantic;
    const [padTop, padRight, padBot, padLeft] = tpl.pad;
    const W = 260;
    const photoW = W - padLeft - padRight;
    const photoH = Math.round(photoW * 3 / 4);
    const gap = tpl.gap;
    const footerH = 44;
    const totalH = padTop + (photoH + gap) * state.photos.length - gap + footerH + padBot;

    buildCanvas.width = W;
    buildCanvas.height = totalH;
    const ctx = buildCanvas.getContext('2d');

    // Background
    if (tpl.bg.startsWith('linear-gradient')) {
      const grad = ctx.createLinearGradient(0, 0, 0, totalH);
      grad.addColorStop(0, '#FADADD');
      grad.addColorStop(1, '#D4EDFF');
      ctx.fillStyle = grad;
    } else {
      ctx.fillStyle = tpl.bg;
    }
    ctx.fillRect(0, 0, W, totalH);

    // Arcade border
    if (state.template === 'arcade') {
      ctx.strokeStyle = '#FF00AA';
      ctx.lineWidth = 3;
      ctx.strokeRect(1.5, 1.5, W-3, totalH-3);
    }

    // Photos
    let y = padTop;
    for (let i = 0; i < state.photos.length; i++) {
      await new Promise(res => {
        const img = new Image();
        img.onload = () => {
          filterCanvas.width = photoW;
          filterCanvas.height = photoH;
          const fc = filterCanvas.getContext('2d');
          fc.drawImage(img, 0, 0, photoW, photoH);
          applyFilter(fc, photoW, photoH, state.selectedFilter);

          // Film borders
          if (state.template === 'film') {
            ctx.fillStyle = '#0A0A0A';
            ctx.fillRect(padLeft, y, photoW, 7);
            ctx.drawImage(filterCanvas, padLeft, y+7, photoW, photoH-14);
            ctx.fillRect(padLeft, y+photoH-7, photoW, 7);
          } else {
            ctx.drawImage(filterCanvas, padLeft, y, photoW, photoH);
          }

          // Border
          if (tpl.imgBorder && tpl.imgBorder !== 'none') {
            const parts = tpl.imgBorder.split(' ');
            ctx.strokeStyle = parts[2] || '#ccc';
            ctx.lineWidth = parseFloat(parts[0]) || 1;
            if (tpl.imgBorder.includes('dashed')) {
              ctx.setLineDash([4,4]);
            } else {
              ctx.setLineDash([]);
            }
            ctx.strokeRect(padLeft, y, photoW, photoH);
            ctx.setLineDash([]);
          }

          y += photoH + gap;
          res();
        };
        img.src = state.photos[i];
      });
    }

    // Footer
    ctx.fillStyle = tpl.footerColor;
    ctx.font = tpl.nameFont;
    ctx.textAlign = 'center';
    ctx.fillText(tpl.label, W/2, y + footerH/2 + 4);
    ctx.fillStyle = tpl.datColor;
    ctx.font = '9px sans-serif';
    ctx.fillText(todayStr(), W/2, y + footerH/2 + 18);

    const link = document.createElement('a');
    link.download = `flashbox-${state.template}-${Date.now()}.png`;
    link.href = buildCanvas.toDataURL('image/png');
    link.click();
  });

  // ═══════ PRINT ═══════
  document.getElementById('btnPrint').addEventListener('click', () => {
    const tpl = TEMPLATES[state.template] || TEMPLATES.romantic;
    const photos = state.photos.map(src =>
      `<img src="${src}" style="width:200px;display:block;margin:0;filter:${getCSSFilter(state.selectedFilter)}">`
    ).join('');
    const win = window.open('', '_blank');
    const bg = tpl.bg.startsWith('linear-gradient') ? tpl.bg : tpl.bg;
    win.document.write(`
      <html><head><title>FLASHBOX Strip</title>
      <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Nunito:wght@700&display=swap" rel="stylesheet">
      <style>
        body { background:white; display:flex; justify-content:center; align-items:flex-start; padding:20px; }
        .ps { background:${bg}; padding:${tpl.pad.join('px ')}px; display:inline-flex; flex-direction:column; gap:${tpl.gap}px; }
        img { display:block; border:${tpl.imgBorder}; }
        .pf { text-align:center; padding:8px 0 2px; font:${tpl.nameFont}; color:${tpl.footerColor}; letter-spacing:.12em; }
        .pd { font-size:8px; color:${tpl.datColor}; text-align:center; letter-spacing:.1em; font-family:sans-serif; }
        @media print { @page { margin:.5cm; } }
      </style></head>
      <body><div class="ps">${photos}<div class="pf">${tpl.label}</div><div class="pd">${todayStr()}</div></div></body>
      </html>`);
    win.document.close();
    win.focus();
    setTimeout(() => win.print(), 500);
  });

  // ═══════ NEW SESSION ═══════
  document.getElementById('btnNewSession').addEventListener('click', () => {
    state.photos = [];
    state.currentShot = 0;
    state.shooting = false;
    showScreen('welcome');
  });
</script>
</body>
</html>
